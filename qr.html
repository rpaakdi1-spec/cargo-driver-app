<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <title>접속 QR코드 - 화물운송 관리 시스템</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- QR코드 생성 라이브러리 -->
    <script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"></script>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        body {
            font-family: 'Noto Sans KR', sans-serif;
            background: linear-gradient(135deg, #0f172a 0%, #1e3a5f 50%, #1d4ed8 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .page-header {
            text-align: center;
            color: white;
            padding: 32px 16px 24px;
        }
        .page-header .logo {
            width: 72px; height: 72px;
            background: rgba(255,255,255,0.15);
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            margin: 0 auto 16px;
            font-size: 2rem; color: #60a5fa;
            border: 2px solid rgba(255,255,255,0.2);
        }
        .page-header h1 { font-size: 1.6rem; font-weight: 700; margin-bottom: 6px; }
        .page-header p { font-size: 0.9rem; opacity: 0.7; }

        .base-url-box {
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 12px;
            padding: 14px 20px;
            margin: 0 auto 28px;
            max-width: 700px;
            display: flex;
            align-items: center;
            gap: 12px;
            flex-wrap: wrap;
        }
        .base-url-label {
            color: rgba(255,255,255,0.6);
            font-size: 0.8rem;
            white-space: nowrap;
        }
        .base-url-text {
            color: #93c5fd;
            font-size: 0.82rem;
            word-break: break-all;
            flex: 1;
            font-family: monospace;
        }
        .copy-btn {
            background: rgba(255,255,255,0.15);
            border: 1px solid rgba(255,255,255,0.3);
            color: white;
            padding: 6px 14px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.8rem;
            white-space: nowrap;
            transition: all 0.2s;
            font-family: 'Noto Sans KR', sans-serif;
        }
        .copy-btn:hover { background: rgba(255,255,255,0.25); }

        .cards {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 20px;
            max-width: 1000px;
            margin: 0 auto;
        }

        .qr-card {
            background: white;
            border-radius: 20px;
            padding: 28px 24px;
            text-align: center;
            box-shadow: 0 20px 40px rgba(0,0,0,0.3);
            position: relative;
            overflow: hidden;
        }
        .qr-card::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 5px;
        }
        .card-admin::before  { background: linear-gradient(90deg, #6366f1, #8b5cf6); }
        .card-customer::before { background: linear-gradient(90deg, #2563eb, #0891b2); }


        .card-icon {
            width: 56px; height: 56px;
            border-radius: 14px;
            display: flex; align-items: center; justify-content: center;
            font-size: 1.5rem;
            margin: 0 auto 14px;
        }
        .card-admin  .card-icon { background: #ede9fe; color: #7c3aed; }
        .card-customer .card-icon { background: #dbeafe; color: #2563eb; }


        .card-title {
            font-size: 1.2rem;
            font-weight: 700;
            color: #0f172a;
            margin-bottom: 4px;
        }
        .card-desc {
            font-size: 0.82rem;
            color: #64748b;
            margin-bottom: 20px;
            line-height: 1.6;
        }

        .qr-wrap {
            background: #f8fafc;
            border-radius: 14px;
            padding: 16px;
            margin-bottom: 16px;
            display: inline-block;
        }
        .qr-wrap canvas, .qr-wrap img { display: block; }

        .url-box {
            background: #f1f5f9;
            border-radius: 10px;
            padding: 10px 14px;
            margin-bottom: 14px;
            font-size: 0.75rem;
            color: #475569;
            word-break: break-all;
            font-family: monospace;
            text-align: left;
        }

        .btn-copy-url {
            width: 100%;
            padding: 10px;
            border-radius: 10px;
            border: none;
            font-size: 0.88rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            font-family: 'Noto Sans KR', sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            margin-bottom: 8px;
        }
        .btn-copy-url:hover { opacity: 0.85; transform: translateY(-1px); }

        .card-admin   .btn-copy-url { background: #7c3aed; color: white; }
        .card-customer .btn-copy-url { background: #2563eb; color: white; }


        .btn-download {
            width: 100%;
            padding: 8px;
            border-radius: 10px;
            border: 1px solid #e2e8f0;
            background: white;
            color: #64748b;
            font-size: 0.82rem;
            cursor: pointer;
            transition: all 0.2s;
            font-family: 'Noto Sans KR', sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
        }
        .btn-download:hover { background: #f8fafc; color: #334155; }

        .tip-box {
            background: rgba(255,255,255,0.08);
            border: 1px solid rgba(255,255,255,0.15);
            border-radius: 12px;
            padding: 16px 20px;
            max-width: 700px;
            margin: 28px auto 0;
            color: rgba(255,255,255,0.8);
            font-size: 0.85rem;
            line-height: 1.8;
        }
        .tip-box strong { color: #93c5fd; }

        .toast {
            position: fixed;
            bottom: 30px; left: 50%;
            transform: translateX(-50%) translateY(20px);
            background: #1e293b;
            color: white;
            padding: 12px 24px;
            border-radius: 30px;
            font-size: 0.88rem;
            opacity: 0;
            transition: all 0.3s;
            z-index: 9999;
            white-space: nowrap;
        }
        .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

        @media (max-width: 600px) {
            .cards { grid-template-columns: 1fr; }
            .page-header h1 { font-size: 1.3rem; }
        }

        .back-btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            color: rgba(255,255,255,0.7);
            text-decoration: none;
            font-size: 0.88rem;
            margin-bottom: 16px;
            transition: color 0.2s;
        }
        .back-btn:hover { color: white; }
    </style>
</head>
<body>

    <div class="page-header">
        <a href="index.html" class="back-btn">
            <i class="fas fa-arrow-left"></i> 홈으로
        </a>
        <div class="logo"><i class="fas fa-qrcode"></i></div>
        <h1>접속 QR코드 & 링크</h1>
        <p>각 역할별 QR코드를 스캔하거나 링크를 복사해서 전달하세요</p>
    </div>

    <!-- 기본 URL 표시 -->
    <div class="base-url-box">
        <span class="base-url-label">🌐 사이트 주소</span>
        <span class="base-url-text" id="baseUrlText"></span>
        <button class="copy-btn" onclick="copyText(BASE_URL, this)">
            <i class="fas fa-copy"></i> 복사
        </button>
    </div>

    <!-- QR 카드들 -->
    <div class="cards">

        <!-- 관리자 -->
        <div class="qr-card card-admin">
            <div class="card-icon"><i class="fas fa-shield-alt"></i></div>
            <div class="card-title">관리자</div>
            <div class="card-desc">고객사 룸 생성 · 전체 배송 현황 관리</div>
            <div class="qr-wrap">
                <div id="qrAdmin"></div>
            </div>
            <div class="url-box" id="urlAdmin"></div>
            <button class="btn-copy-url" onclick="copyUrl('admin')">
                <i class="fas fa-copy"></i> 링크 복사
            </button>
            <button class="btn-download" onclick="downloadQR('qrAdmin', '관리자_QR')">
                <i class="fas fa-download"></i> QR 이미지 저장
            </button>
        </div>

        <!-- 고객사 -->
        <div class="qr-card card-customer">
            <div class="card-icon"><i class="fas fa-building"></i></div>
            <div class="card-title">고객사</div>
            <div class="card-desc">배송현황 · GPS 지도 · 서류 사진<br>룸 비밀번호로 입장</div>
            <div class="qr-wrap">
                <div id="qrCustomer"></div>
            </div>
            <div class="url-box" id="urlCustomer"></div>
            <button class="btn-copy-url" onclick="copyUrl('customer')">
                <i class="fas fa-copy"></i> 링크 복사
            </button>
            <button class="btn-download" onclick="downloadQR('qrCustomer', '고객사_QR')">
                <i class="fas fa-download"></i> QR 이미지 저장
            </button>
        </div>



    </div>

    <!-- 안내 -->
    <div class="tip-box">
        <strong><i class="fas fa-lightbulb"></i> 사용 방법</strong><br>
        🏢 <strong>고객사</strong> → 고객사 링크 복사 후 카톡/이메일로 전달<br>
        🔒 <strong>관리자</strong> → 관리자 링크는 내부 관리용으로만 사용
    </div>

    <div class="toast" id="toast"></div>

    <script>
        const BASE_URL = 'https://rhkdtlsscm.cloud';

        const URLS = {
            admin:    BASE_URL + '/admin.html',
            customer: BASE_URL + '/index.html'
        };

        // 기본 URL 표시
        document.getElementById('baseUrlText').textContent = BASE_URL;
        document.getElementById('urlAdmin').textContent    = URLS.admin;
        document.getElementById('urlCustomer').textContent = URLS.customer;

        // QR 코드 생성
        function makeQR(elementId, url) {
            new QRCode(document.getElementById(elementId), {
                text: url,
                width: 180,
                height: 180,
                colorDark: '#0f172a',
                colorLight: '#f8fafc',
                correctLevel: QRCode.CorrectLevel.M
            });
        }

        makeQR('qrAdmin',    URLS.admin);
        makeQR('qrCustomer', URLS.customer);

        // 링크 복사
        function copyUrl(role) {
            copyText(URLS[role]);
        }

        function copyText(text, btn) {
            navigator.clipboard.writeText(text).then(() => {
                showToast('✅ 클립보드에 복사되었습니다!');
                if (btn) {
                    const orig = btn.innerHTML;
                    btn.innerHTML = '<i class="fas fa-check"></i> 복사됨';
                    setTimeout(() => btn.innerHTML = orig, 2000);
                }
            }).catch(() => {
                // 구형 브라우저 폴백
                const ta = document.createElement('textarea');
                ta.value = text;
                document.body.appendChild(ta);
                ta.select();
                document.execCommand('copy');
                document.body.removeChild(ta);
                showToast('✅ 클립보드에 복사되었습니다!');
            });
        }

        // QR 이미지 다운로드
        function downloadQR(containerId, filename) {
            const container = document.getElementById(containerId);
            const canvas = container.querySelector('canvas');
            const img    = container.querySelector('img');

            if (canvas) {
                const link = document.createElement('a');
                link.download = filename + '.png';
                link.href = canvas.toDataURL('image/png');
                link.click();
                showToast('📥 QR 이미지가 저장되었습니다!');
            } else if (img) {
                // canvas가 없으면 img 태그로 처리
                const link = document.createElement('a');
                link.download = filename + '.png';
                link.href = img.src;
                link.click();
                showToast('📥 QR 이미지가 저장되었습니다!');
            } else {
                showToast('⚠️ QR코드가 아직 생성되지 않았습니다.', true);
            }
        }

        // 토스트
        function showToast(msg) {
            const t = document.getElementById('toast');
            t.textContent = msg;
            t.classList.add('show');
            clearTimeout(window._toastTimer);
            window._toastTimer = setTimeout(() => t.classList.remove('show'), 2500);
        }
    </script>
</body>
</html>
